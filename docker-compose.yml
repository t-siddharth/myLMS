services:
  postgres:
    image: postgres:16
    container_name: mylms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mylms}
      POSTGRES_USER: ${POSTGRES_USER:-mylms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mylms_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mylms} -d ${POSTGRES_DB:-mylms}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
